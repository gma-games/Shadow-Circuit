name: Build Unity Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Unity Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/cache@v5
        with:
          path: Library
          key: Library-Tests-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-Tests-
            Library-

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.8f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Unity-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  build:
    name: Build ${{ matrix.artifactName }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneWindows64
            os: ubuntu-latest
            artifactName: Windows
            zipName: Windows.zip

          - targetPlatform: StandaloneLinux64
            os: ubuntu-latest
            artifactName: Linux
            zipName: Linux.zip

          - targetPlatform: StandaloneOSX
            os: macos-latest
            artifactName: macOS
            zipName: macOS.zip

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.8f1
          targetPlatform: ${{ matrix.targetPlatform }}
          buildsPath: build
          buildName: Game
          allowDirtyBuild: true

      - name: Zip build
        run: |
          cd build
          zip -r "../${{ matrix.zipName }}" .

      - name: Upload release file
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.zipName }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
